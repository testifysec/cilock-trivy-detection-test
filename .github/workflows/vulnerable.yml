    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t example-api:${{ github.sha }} .

      # THIS IS THE VULNERABLE STEP — mutable tag, no attestation
