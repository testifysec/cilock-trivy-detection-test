# cilock detection validation: proves secretscan catches TeamPCP-style attacks
# Uses Fulcio OIDC signing (native to GitHub Actions) + cilock verify with policy
name: cilock Detection Validation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Job 1: Run the simulated attack payload wrapped in cilock
  detect-attack:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cilock
        run: |
          curl -sSfL https://github.com/aflock-ai/rookery/releases/download/v0.0.1-test/cilock-v0.0.1-test-linux-amd64.tar.gz -o cilock.tar.gz
          tar xzf cilock.tar.gz
          chmod +x cilock-linux-amd64
          sudo mv cilock-linux-amd64 /usr/local/bin/cilock

      - name: Run simulated attack with cilock secretscan
        run: |
          cilock run \
            --step attack-simulation \
            --attestations secretscan \
            --attestations git \
            --attestations environment \
            --signer-fulcio-url https://fulcio.sigstore.dev \
            --signer-fulcio-oidc-issuer https://token.actions.githubusercontent.com \
            --signer-fulcio-oidc-client-id sigstore \
            --enable-archivista=false \
            --outfile attack-attestation.json \
            -- bash entrypoint.sh

      - name: Show secretscan findings
        run: |
          echo "## Secretscan Findings" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json, base64
          data = json.load(open('attack-attestation.json'))
          payload = json.loads(base64.b64decode(data['payload']))
          for att in payload['predicate']['attestations']:
              if 'secretscan' in att['type']:
                  findings = att['attestation'].get('findings') or []
                  print(f'Found {len(findings)} secrets in pipeline output')
                  for f in findings:
                      print(f'  - {f[\"ruleId\"]}: {f[\"match\"][:40]}...')
          " | tee -a $GITHUB_STEP_SUMMARY

      - name: Upload attestation
        uses: actions/upload-artifact@v4
        with:
          name: attack-attestation
          path: attack-attestation.json

  # Job 2: Verify the attestation against policy using cilock verify
  verify-policy:
    needs: detect-attack
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cilock
        run: |
          curl -sSfL https://github.com/aflock-ai/rookery/releases/download/v0.0.1-test/cilock-v0.0.1-test-linux-amd64.tar.gz -o cilock.tar.gz
          tar xzf cilock.tar.gz
          chmod +x cilock-linux-amd64
          sudo mv cilock-linux-amd64 /usr/local/bin/cilock

      - name: Download attestation
        uses: actions/download-artifact@v4
        with:
          name: attack-attestation

      - name: Sign policy with Fulcio
        run: |
          cilock sign \
            -f policy.json \
            -o policy-signed.json \
            --signer-fulcio-url https://fulcio.sigstore.dev \
            --signer-fulcio-oidc-issuer https://token.actions.githubusercontent.com \
            --signer-fulcio-oidc-client-id sigstore

      - name: Verify attestation against policy
        id: verify
        continue-on-error: true
        run: |
          cilock verify \
            -p policy-signed.json \
            -a attack-attestation.json \
            -f entrypoint.sh \
            --enable-archivista=false \
            --policy-ca-roots sigstore-root.pem \
            --log-level info 2>&1 | tee verify-output.txt

      - name: Report results
        run: |
          echo "## Policy Verification Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat verify-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "Secret detected" verify-output.txt 2>/dev/null || grep -q "policy.*denied\|Verification failed" verify-output.txt 2>/dev/null; then
            echo "**POLICY DENIED** — secrets detected in pipeline output. This is expected for the attack simulation." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Note:** Policy verification output above. Check for Rego policy denial messages." >> $GITHUB_STEP_SUMMARY
          fi
