# PROTECTED: cilock-action wraps trivy-action with cryptographic attestation.
# SHA-pinned, secret-scanned, signed, policy-enforced, and SARIF-captured.
name: Build and Scan (PROTECTED with cilock)

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for Sigstore OIDC signing
      contents: read
    outputs:
      scan-attestation-oid: ${{ steps.trivy-scan.outputs.git_oid }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t example-api:${{ github.sha }} .

      # cilock wraps trivy-action with full attestation suite
      - name: Attested Trivy vulnerability scan
        id: trivy-scan
        uses: aflock-ai/cilock-action@v1
        with:
          step: trivy-vulnerability-scan
          attestations: github-action secretscan sarif git environment
          action-ref: aquasecurity/trivy-action@a7a829a0747c57d5c3bba2b8d9d1387c88e9e608
          action-inputs: |
            {"image-ref": "example-api:${{ github.sha }}", "format": "sarif", "output": "trivy-results.sarif"}

      - name: Display attestation ID
        run: |
          echo "Scan attestation GitOID: ${{ steps.trivy-scan.outputs.git_oid }}"
          echo "Attestation file: ${{ steps.trivy-scan.outputs.attestation_file }}"

  # Simulate the malicious entrypoint.sh from the Trivy attack
  detect-attack:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      attack-attestation-oid: ${{ steps.attack-sim.outputs.git_oid }}
    steps:
      - uses: actions/checkout@v4

      # cilock wraps the simulated attack — secretscan WILL fire
      - name: Run simulated attack payload (cilock catches secrets)
        id: attack-sim
        uses: aflock-ai/cilock-action@v1
        with:
          step: attack-simulation
          attestations: secretscan environment git
          command: bash entrypoint.sh
          outfile: attack-attestation.json

      - name: Upload attestation artifact
        uses: actions/upload-artifact@v4
        with:
          name: attack-attestation
          path: attack-attestation.json

  # Policy verification step
  verify-policy:
    needs: [build-and-scan, detect-attack]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download attack attestation
        uses: actions/download-artifact@v4
        with:
          name: attack-attestation

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Extract attestation payload
        run: |
          cat attack-attestation.json | python3 -c "
          import json, base64, sys
          data = json.load(sys.stdin)
          payload = json.loads(base64.b64decode(data['payload']))
          json.dump(payload, open('decoded-payload.json', 'w'), indent=2)
          "

      - name: Run secretscan policy
        run: |
          echo "=== Evaluating secretscan policy ==="
          opa eval -i decoded-payload.json -d policy-secretscan.rego \
            'data.cilock.verify.deny' --format pretty
          echo ""
          DENIALS=$(opa eval -i decoded-payload.json -d policy-secretscan.rego \
            'count(data.cilock.verify.deny)' --format raw)
          echo "Policy denials: $DENIALS"
          if [ "$DENIALS" -gt 0 ]; then
            echo "::error::POLICY VIOLATION: Secrets detected in pipeline output!"
            echo "This is expected — the simulated attack payload contains credentials."
            echo "In production, this would block the release."
          fi

      - name: Summary
        run: |
          echo "## cilock Detection Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Scan attestation | ${{ needs.build-and-scan.outputs.scan-attestation-oid || 'Generated' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Attack simulation | Secrets detected in output |" >> $GITHUB_STEP_SUMMARY
          echo "| Policy verification | Denials triggered (expected) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [blog post](https://testifysec.com/blog/cilock-action-supply-chain-attacks) for full analysis." >> $GITHUB_STEP_SUMMARY
